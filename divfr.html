<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sitio en Mantenimiento - Fuera de Servicio</title>
    <style>
        /* Importación de tipografía moderna */
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #f8fafc;
        }

        /* Capa de los iconos flotantes interactivos */
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .floating-icon {
            position: absolute;
            pointer-events: none;
            will-change: transform;
            transition: opacity 0.3s ease;
        }

        /* Contenedor Principal (Efecto Glassmorphism) */
        .card {
            position: relative;
            z-index: 10;
            background: rgba(30, 41, 59, 0.45);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 3rem 2.5rem;
            border-radius: 28px;
            text-align: center;
            max-width: 540px;
            width: 90%;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4),
                        inset 0 1px 0 rgba(255, 255, 255, 0.1);
            animation: fadeInCard 1s ease-out;
        }

        @keyframes fadeInCard {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Icono de Alerta Principal Animado */
        .main-alert-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 80px;
            height: 80px;
            background: rgba(24a, 158, 11, 0.1);
            border: 2px solid #f59e0b;
            color: #f59e0b;
            border-radius: 50%;
            font-size: 2.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 0 20px rgba(245, 158, 11, 0.2);
            animation: pulseGlow 2s infinite alternate ease-in-out;
        }

        @keyframes pulseGlow {
            0% { transform: scale(1); box-shadow: 0 0 20px rgba(245, 158, 11, 0.2); }
            100% { transform: scale(1.06); box-shadow: 0 0 35px rgba(245, 158, 11, 0.4); }
        }

        /* Títulos y Textos */
        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 0.75rem;
            background: linear-gradient(135deg, #ffffff 0%, #cbd5e1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-badge {
            display: inline-block;
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #f87171;
            padding: 0.35rem 1rem;
            border-radius: 100px;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 1.5rem;
        }

        p {
            color: #94a3b8;
            font-size: 1.05rem;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        /* Barra de Progreso / Simulación de Carga Estilizada */
        .progress-container {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            height: 8px;
            border-radius: 100px;
            overflow: hidden;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .progress-bar {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, 
                #facc15 0%, 
                #eab308 25%, 
                #facc15 50%, 
                #eab308 75%, 
                #facc15 100%
            );
            background-size: 200% 100%;
            animation: barberPole 2.5s linear infinite;
            border-radius: 100px;
        }

        @keyframes barberPole {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Pie de página sutil */
        .footer-note {
            margin-top: 2rem;
            font-size: 0.85rem;
            color: #64748b;
        }
    </style>
</head>
<body>

    <!-- Contenedor donde se inyectan los iconos móviles mediante JS -->
    <div id="canvas-container"></div>

    <!-- Tarjeta Central informativa -->
    <div class="card">
        <div class="main-alert-icon">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
                <line x1="12" y1="9" x2="12" y2="13"></line>
                <line x1="12" y1="17" x2="12.01" y2="17"></line>
            </svg>
        </div>
        <div class="status-badge">Fuera de Servicio</div>
        <h1>Estamos mejorando</h1>
        <p>Nuestro sitio web se encuentra temporalmente inactivo por tareas de mantenimiento y optimización técnica. Volveremos a estar en línea muy pronto con mejoras increíbles.</p>
        
        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>

        <div class="footer-note">
            Disculpa las molestias operativas · © 2026
        </div>
    </div>

    <script>
        // Definición de iconos vectoriales relacionados (Engranaje, Llave inglesa, Alerta, Tuerca)
        const iconsSVG = [
            // Engranaje
            `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>`,
            // Llave inglesa
            `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M22.7,19l-9.1-9.1c0.9-2.3,0.4-5-1.5-6.9c-2-2-5.1-2.4-7.5-1.2L7.9,5.1L6.4,6.6L3.1,3.3C1.9,5.7,2.2,8.9,4.2,10.9c1.9,1.9,4.6,2.4,6.9,1.5l9.1,9.1c0.4,0.4,1,0.4,1.4,0l1.1-1.1C23.1,20,23.1,19.4,22.7,19z"/></svg>`,
            // Señal de Advertencia / Exclamación
            `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12,2L1,21h22L12,2z M13,18h-2v-2h2V18z M13,14h-2v-4h2V14z"/></svg>`,
            // Tuerca / Destornillador alternativo
            `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12,2C6.48,2,2,6.48,2,12s4.48,10,10,10s10-4.48,10-10S17.52,2,12,2z M12,16c-2.21,0-4-1.79-4-4s1.79-4,4-4s4,1.79,4,4S14.21,16,12,16z"/></svg>`
        ];

        const container = document.getElementById('canvas-container');
        const totalIcons = 16; // Número de iconos de fondo en movimiento
        const items = [];
        let mouse = { x: -1000, y: -1000 };

        // Capturar movimiento del ratón para el efecto interactivo de repulsión
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        // Crear dinámicamente los elementos en la pantalla
        for (let i = 0; i < totalIcons; i++) {
            const el = document.createElement('div');
            el.className = 'floating-icon';
            el.innerHTML = iconsSVG[Math.floor(Math.random() * iconsSVG.length)];
            container.appendChild(el);

            const size = Math.random() * 35 + 25; // Tamaños variados entre 25px y 60px
            el.style.width = size + 'px';
            el.style.height = size + 'px';
            
            // Opacidad baja para servir como fondo elegante y no entorpecer la lectura
            el.style.opacity = Math.random() * 0.12 + 0.06;
            
            // Asignar colores temáticos sutiles (amarillo advertencia o gris azulado)
            el.style.color = Math.random() > 0.6 ? '#facc15' : '#475569';

            items.push({
                el: el,
                x: Math.random() * window.innerWidth,
                y: Math.random() * window.innerHeight,
                vx: (Math.random() - 0.5) * 1.2, // Velocidad en X
                vy: (Math.random() - 0.5) * 1.2, // Velocidad en Y
                size: size,
                angle: Math.random() * 360,
                rotationSpeed: (Math.random() - 0.5) * 0.8
            });
        }

        // Bucle de animación (Smooth 60fps con requestAnimationFrame)
        function animate() {
            const w = window.innerWidth;
            const h = window.innerHeight;

            items.forEach(item => {
                // Actualizar posiciones básicas por su velocidad
                item.x += item.vx;
                item.y += item.vy;
                item.angle += item.rotationSpeed;

                // --- EFECTO INTERACTIVO: El ratón empuja sutilmente a los iconos ---
                const dx = item.x + item.size / 2 - mouse.x;
                const dy = item.y + item.size / 2 - mouse.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                const maxDistance = 160; // Radio de interacción

                if (distance < maxDistance) {
                    const force = (maxDistance - distance) / maxDistance;
                    // Empujar suavemente en la dirección opuesta al puntero
                    item.x += (dx / distance) * force * 2.5;
                    item.y += (dy / distance) * force * 2.5;
                }

                // --- COLISIONES CON LOS BORDES DE LA PANTALLA (Rebote continuo) ---
                if (item.x < 0) { 
                    item.x = 0; 
                    item.vx *= -1; 
                } else if (item.x > w - item.size) { 
                    item.x = w - item.size; 
                    item.vx *= -1; 
                }

                if (item.y < 0) { 
                    item.y = 0; 
                    item.vy *= -1; 
                } else if (item.y > h - item.size) { 
                    item.y = h - item.size; 
                    item.vy *= -1; 
                }

                // Aplicar transformaciones usando aceleración por hardware (translate3d)
                item.el.style.transform = `translate3d(${item.x}px, ${item.y}px, 0) rotate(${item.angle}deg)`;
            });

            requestAnimationFrame(animate);
        }

        animate();

        // Reajuste fluido en caso de cambiar el tamaño de la ventana
        window.addEventListener('resize', () => {
            items.forEach(item => {
                if (item.x > window.innerWidth) item.x = window.innerWidth - item.size;
                if (item.y > window.innerHeight) item.y = window.innerHeight - item.size;
            });
        });
    </script>
</body>
</html>
